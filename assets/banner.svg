<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#09111f"/>
      <stop offset="1" stop-color="#12243a"/>
    </linearGradient>
    <linearGradient id="panel" x1="96" y1="84" x2="1184" y2="556" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b1728"/>
      <stop offset="1" stop-color="#0e1b2d"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <circle cx="1060" cy="130" r="190" fill="#0ea5e9" fill-opacity="0.08"/>
  <circle cx="180" cy="540" r="210" fill="#22c55e" fill-opacity="0.06"/>

  <rect x="96" y="84" width="1088" height="472" rx="28" fill="url(#panel)" stroke="#20324a" stroke-width="2"/>
  <rect x="128" y="116" width="220" height="36" rx="18" fill="#10243b" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="238" y="139" fill="#93c5fd" font-family="Verdana, Arial, sans-serif" font-size="15" font-weight="700" text-anchor="middle">PRIVATE SOURCE  /  PUBLIC SHOWCASE</text>

  <text x="128" y="228" fill="#f8fafc" font-family="Verdana, Arial, sans-serif" font-size="72" font-weight="700">hypebot-rs</text>
  <text x="128" y="274" fill="#7dd3fc" font-family="Verdana, Arial, sans-serif" font-size="24" font-weight="700">Rust trading infrastructure for Hyperliquid</text>

  <text x="128" y="336" fill="#cbd5e1" font-family="Verdana, Arial, sans-serif" font-size="24">Typed market feeds, serialized execution, and long-running runtime resilience.</text>
  <text x="128" y="372" fill="#cbd5e1" font-family="Verdana, Arial, sans-serif" font-size="24">Built to feel closer to a service system than a toy bot script.</text>

  <rect x="128" y="430" width="240" height="64" rx="18" fill="#0d2238" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="152" y="458" fill="#e2e8f0" font-family="Verdana, Arial, sans-serif" font-size="22" font-weight="700">Runtime</text>
  <text x="152" y="483" fill="#7dd3fc" font-family="Verdana, Arial, sans-serif" font-size="16">heartbeat, stale detection, reconnect loop</text>

  <rect x="392" y="430" width="260" height="64" rx="18" fill="#10281d" stroke="#16a34a" stroke-width="1.5"/>
  <text x="416" y="458" fill="#e2e8f0" font-family="Verdana, Arial, sans-serif" font-size="22" font-weight="700">Execution</text>
  <text x="416" y="483" fill="#86efac" font-family="Verdana, Arial, sans-serif" font-size="16">single-path order flow with stricter discipline</text>

  <rect x="676" y="430" width="356" height="64" rx="18" fill="#1f1633" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="700" y="458" fill="#e2e8f0" font-family="Verdana, Arial, sans-serif" font-size="22" font-weight="700">Strategy</text>
  <text x="700" y="483" fill="#c4b5fd" font-family="Verdana, Arial, sans-serif" font-size="16">breakout retest, ATR, ADX, BB width, volume filters</text>

  <rect x="848" y="154" width="272" height="210" rx="24" fill="#0a1220" stroke="#26364d" stroke-width="1.5"/>
  <text x="880" y="196" fill="#f8fafc" font-family="Verdana, Arial, sans-serif" font-size="28" font-weight="700">Core Signals</text>
  <text x="880" y="238" fill="#94a3b8" font-family="Verdana, Arial, sans-serif" font-size="18">Per-symbol runners</text>
  <text x="880" y="272" fill="#94a3b8" font-family="Verdana, Arial, sans-serif" font-size="18">Persistent local state</text>
  <text x="880" y="306" fill="#94a3b8" font-family="Verdana, Arial, sans-serif" font-size="18">Dry-run support</text>
  <text x="880" y="340" fill="#94a3b8" font-family="Verdana, Arial, sans-serif" font-size="18">Discord notifications</text>
</svg>
